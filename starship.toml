format = """
$os\
[оӮ°](fg:base bg:surface0)\
$sudo\
$hostname\
[ ](fg:surface1 bg:surface0)\
[оӮ°](fg:surface0 bg:surface1)\
$directory\
[оӮ°](fg:surface1 bg:surface2)\
$git_branch\
$git_status\
[оӮ°](fg:surface2 bg:surface0)\
$java\
$gradle\
$ruby\
$rust\
[оӮ° ](fg:surface0 bg:none)\
"""
right_format = "$cmd_duration $time"

command_timeout = 30000
palette = "catppuccin_mocha"

[sudo]
format = '[$symbol]($style)'
style = 'bold bg:surface0 fg:peach'
symbol = ' уұҰҡ'
disabled = false

[hostname]
ssh_only = true
format = '[@$hostname ]($style)'
trim_at = ""
style = 'bold fg:blue bg:surface0'
disabled = false

[os]
style = 'bold fg:text bg:base'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Windows = "оңҸ"
Macos = "оң‘"
openSUSE = "оҪӯ"

[directory]
style = 'fg:pink bg:surface1'
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
".config" = "о—ј "
".git" = "о—» "
".github" = "о—Ҫ "
".syncthing" = "у°ҙӢ "
"Documents" = "уұ§¶ "
"Dokumentumok" = "уұ§¶ "
"Downloads" = "у°үҚ "
"LetГ¶ltГ©sek" = "у°үҚ "
"Music" = "уұҚҷ "
"ZenГ©k" = "уұҚҷ "
"Pictures" = "у°үҸ "
"KГ©pek" = "у°үҸ "
"Videos" = "уұ§ә "
"VideГіk" = "уұ§ә "
"notes" = "уұһҒ "

[git_branch]
symbol = "оӮ "
style = "bg:surface2 fg:lavender"
format = '[ $symbol $branch ]($style)'
truncation_length = 16
truncation_symbol = "вҖҰ"

[git_status]
style = "bg:surface2 fg:lavender"
format = '[$all_status$ahead_behind ]($style)'

[gradle]
symbol = "оҹІ"
style = "bg:surface0 fg:blue"
format = '[ $symbol ]($style)'

[java]
symbol = "оү–"
style = "bg:surface0 fg:red"
format = '[ $symbol ]($style)'

[ruby]
detect_variables = []
symbol = "оһ‘"
style = "bg:surface0 fg:red"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оһЁ"
style = "bg:surface0 fg:peach"
format = '[ $symbol ($version) ]($style)'

[character]
format = '$symbol'
success_symbol = '[пҒ”](bold bg:surface1 fg:green)'
error_symbol = '[пҒ”](bold bg:surface1 fg:red)'

[cmd_duration]
style = "bg:none fg:surface1"
format = "[$duration]($style)"

[time]
disabled = false
style = "bg:none fg:surface1"
format = "[$time]($style)"
time_format = "%Y-%m-%d %H:%M:%S"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
