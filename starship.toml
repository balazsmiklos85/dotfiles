right_format = "$cmd_duration $time"

command_timeout = 30000
palette = "catppuccin_mocha"

[sudo]
format = '[$symbol]($style)'
style = 'bold bg:surface0 fg:peach'
symbol = ' ¾▒ªÜ'
disabled = false

[username]
show_always = true
style_root = 'bold bg:surface0 fg:sky'
style_user = 'bold bg:surface0 fg:blue'
format = '[ $user]($style)'
disabled = false

[hostname]
ssh_only = true
format = '[@$hostname ]($style)'
trim_at = ""
style = 'bold fg:blue bg:surface0'
disabled = false

[os]
style = 'bold fg:text bg:base'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Windows = "¯£Å"
Macos = "¯£æ"
openSUSE = "¯¢¡"

[directory]
