format = """
$os\
[о‚°](fg:base bg:surface0)\
$sudo\
$hostname\
[ ](fg:surface1 bg:surface0)\
[о‚°](fg:surface0 bg:surface1)\
$directory\
[о‚°](fg:surface1 bg:surface2)\
$git_branch\
$git_status\
[о‚°](fg:surface2 bg:surface0)\
$java\
$gradle\
$ruby\
$rust\
[о‚° ](fg:surface0 bg:none)\
"""
right_format = "$cmd_duration $time"

command_timeout = 30000
palette = "catppuccin_mocha"

[sudo]
format = '[$symbol]($style)'
style = 'bold bg:surface0 fg:peach'
symbol = ' у±¦љ'
disabled = false

[hostname]
ssh_only = true
format = '[ $hostname ]($style)'
trim_at = ""
style = 'bold fg:blue bg:surface0'
disabled = false

[os]
style = 'bold fg:text bg:base'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Windows = "оњЏ"
Macos = "оњ‘"
openSUSE = "оЅ­"

[directory]
style = 'fg:pink bg:surface1'
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вЂ¦/"

[directory.substitutions]
".config" = "о—ј"
".git" = "о—»"
".github" = "о—Ѕ"
".syncthing" = "у°ґ‹"
"Documents" = "у±§¶"
"Dokumentumok" = "у±§¶"
"Downloads" = "у°‰Ќ"
"LetГ¶ltГ©sek" = "у°‰Ќ"
"Music" = "у±Ќ™"
"ZenГ©k" = "у±Ќ™"
"Pictures" = "у°‰Џ"
"KГ©pek" = "у°‰Џ"
"Videos" = "у±§є"
"VideГіk" = "у±§є"
"notes" = "у±ћЃ"

[git_branch]
symbol = "о‚ "
style = "bg:surface2 fg:lavender"
format = '[ $symbol $branch ]($style)'
truncation_length = 16
truncation_symbol = "вЂ¦"

[git_status]
style = "bg:surface2 fg:lavender"
format = '[$all_status$ahead_behind ]($style)'

[gradle]
symbol = "оџІ"
style = "bg:surface0 fg:blue"
format = '[ $symbol ($version) ]($style)'
version_format = 'v${major}.${minor}'

[java]
symbol = "о‰–"
style = "bg:surface0 fg:red"
format = '[ $symbol ($version)]($style)'
version_format = 'v${major}'

[ruby]
detect_variables = []
symbol = "оћ‘"
style = "bg:surface0 fg:red"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оћЁ"
style = "bg:surface0 fg:peach"
format = '[ $symbol ($version) ]($style)'

[character]
format = '$symbol'
success_symbol = '[пЃ”](bold bg:surface1 fg:green)'
error_symbol = '[пЃ”](bold bg:surface1 fg:red)'

[cmd_duration]
style = "bg:none fg:surface1"
format = "[$duration]($style)"

[time]
disabled = false
style = "bg:none fg:surface1"
format = "[$time]($style)"
time_format = "%Y-%m-%d %H:%M:%S"

